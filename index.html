<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Friendly Sorter</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif; }
        body { background: #0b0f1a; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { max-width: 820px; width: 100%; background: #141a26; border-radius: 24px; padding: 32px 30px 30px 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.7); border: 1px solid #222b3a; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .header h1 { color: #ffffff; font-size: 26px; font-weight: 700; letter-spacing: -0.3px; }
        .header .card-count { color: #8a94a6; font-size: 15px; font-weight: 500; background: #1e2636; padding: 5px 14px; border-radius: 40px; border: 1px solid #2a3344; }
        .sub-head { color: #8a94a6; font-size: 15px; font-weight: 400; margin-bottom: 28px; margin-top: 2px; }
        .filters { display: flex; flex-direction: column; gap: 22px; }
        .filter-group { display: flex; flex-direction: column; gap: 6px; }
        .filter-group .filter-label { color: #a8b2c9; font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; }
        .filter-group .filter-items { display: flex; flex-wrap: wrap; align-items: center; gap: 6px 18px; background: #101624; padding: 10px 16px; border-radius: 12px; border: 1px solid #1f2838; min-height: 46px; }
        .filter-group .filter-items .item { color: #d0d8e6; font-size: 14px; font-weight: 400; display: flex; align-items: center; gap: 5px; }
        .filter-group .filter-items .item .flag { font-size: 18px; line-height: 1; }
        .filter-group .filter-items .item .bank-bold { font-weight: 700; color: #ffffff; }
        .filter-group .filter-items .more { color: #4d8cf7; font-size: 14px; font-weight: 500; cursor: pointer; transition: 0.2s; margin-left: 4px; background: none; border: none; padding: 2px 6px; }
        .filter-group .filter-items .more:hover { color: #6aa0ff; text-decoration: underline; }
        .actions { display: flex; gap: 14px; margin-top: 28px; flex-wrap: wrap; }
        .actions .btn { padding: 12px 34px; border: none; border-radius: 40px; font-size: 15px; font-weight: 600; cursor: pointer; transition: 0.2s; letter-spacing: 0.3px; }
        .btn-apply { background: #4d8cf7; color: #ffffff; box-shadow: 0 4px 14px rgba(77,140,247,0.3); }
        .btn-apply:hover { background: #3a7ae6; transform: scale(1.02); box-shadow: 0 6px 20px rgba(77,140,247,0.4); }
        .btn-reset { background: #1e2636; color: #a8b2c9; border: 1px solid #2a3344; }
        .btn-reset:hover { background: #2a3344; color: #ffffff; }
        .btn-export { background: #1e2636; color: #a8b2c9; border: 1px solid #2a3344; }
        .btn-export:hover { background: #2a3344; color: #ffffff; }
        .stats-bar { display: flex; gap: 28px; flex-wrap: wrap; margin-top: 22px; padding: 12px 0; border-top: 1px solid #1f2838; }
        .stats-bar .stat { display: flex; align-items: center; gap: 6px; color: #8a94a6; font-size: 14px; }
        .stats-bar .stat .num { color: #ffffff; font-weight: 700; font-size: 16px; }
        .stats-bar .stat .num.valid { color: #4cdf8b; }
        .stats-bar .stat .num.invalid { color: #f75c5c; }
        .stats-bar .stat .num.expired { color: #f7b84d; }
        .table-wrap { margin-top: 18px; overflow-x: auto; border-radius: 12px; border: 1px solid #1f2838; max-height: 300px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 600px; }
        thead { position: sticky; top: 0; z-index: 5; }
        th { background: #101624; color: #8a94a6; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; padding: 10px 10px; text-align: left; border-bottom: 2px solid #1f2838; cursor: pointer; white-space: nowrap; }
        th:hover { background: #1a2333; }
        td { padding: 8px 10px; border-bottom: 1px solid #1a2333; color: #d0d8e6; font-size: 12px; }
        tr:hover td { background: #101624; }
        .bin-tag { background: #1a2333; color: #4d8cf7; padding: 1px 8px; border-radius: 30px; font-size: 10px; font-weight: 600; border: 1px solid #283244; display: inline-block; }
        .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; }
        .status-dot.valid { background: #4cdf8b; }
        .status-dot.invalid { background: #f75c5c; }
        .status-dot.expired { background: #f7b84d; }
        .checkbox-col { width: 28px; text-align: center; }
        .checkbox-col input[type="checkbox"] { accent-color: #4d8cf7; width: 15px; height: 15px; cursor: pointer; }
        .toast { position: fixed; bottom: 24px; right: 24px; background: #1e2636; padding: 14px 26px; border-radius: 40px; border-left: 4px solid #4d8cf7; color: #ffffff; font-size: 14px; font-weight: 500; z-index: 999; box-shadow: 0 10px 30px rgba(0,0,0,0.5); animation: slideUp 0.35s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 600px) { .container { padding: 20px 16px; } .header h1 { font-size: 20px; } .filter-group .filter-items { padding: 8px 12px; gap: 4px 12px; } .filter-group .filter-items .item { font-size: 12px; } .actions .btn { padding: 10px 20px; font-size: 13px; flex: 1; text-align: center; } .stats-bar { gap: 14px; } }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div class="header">
            <h1>Friendly Sorter</h1>
            <span class="card-count" id="totalDisplay">4,993 cards</span>
        </div>
        <div class="sub-head">Select filters.</div>
        <div class="filters" id="filtersContainer">
            <div class="filter-group">
                <span class="filter-label">Country</span>
                <div class="filter-items" id="countryFilter"></div>
            </div>
            <div class="filter-group">
                <span class="filter-label">Bank</span>
                <div class="filter-items" id="bankFilter"></div>
            </div>
            <div class="filter-group">
                <span class="filter-label">Brand</span>
                <div class="filter-items" id="brandFilter"></div>
            </div>
            <div class="filter-group">
                <span class="filter-label">Type</span>
                <div class="filter-items" id="typeFilter"></div>
            </div>
            <div class="filter-group">
                <span class="filter-label">Level</span>
                <div class="filter-items" id="levelFilter"></div>
            </div>
        </div>
        <div class="actions">
            <button class="btn btn-apply" onclick="applyFilters()">✅ Apply</button>
            <button class="btn btn-reset" onclick="resetFilters()">⟳ Reset</button>
            <button class="btn btn-export" onclick="exportFiltered()">⬇ Export</button>
        </div>
        <div class="stats-bar">
            <span class="stat">📊 Total <span class="num" id="statTotal">0</span></span>
            <span class="stat">✅ Valid <span class="num valid" id="statValid">0</span></span>
            <span class="stat">❌ Invalid <span class="num invalid" id="statInvalid">0</span></span>
            <span class="stat">⏳ Expired <span class="num expired" id="statExpired">0</span></span>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th class="checkbox-col"><input type="checkbox" id="selectAll" onchange="toggleAll()" /></th>
                        <th onclick="sortBy('card')">Card</th>
                        <th onclick="sortBy('month')">MM</th>
                        <th onclick="sortBy('year')">YY</th>
                        <th onclick="sortBy('cvv')">CVV</th>
                        <th>BIN</th>
                        <th>Brand</th>
                        <th>Type</th>
                        <th>Level</th>
                        <th>Bank</th>
                        <th>Country</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="12" style="text-align:center;padding:40px;color:#5a6478;">📭 No cards loaded</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let allCards = [];
        let filteredCards = [];
        let selectedIndices = new Set();

        const filterOptions = {
            country: [{ flag: '🇵🇹', name: 'Puerto Rico' }, { flag: '🇬🇧', name: 'Guinea' }, { flag: '🇳🇿', name: 'New Zealand' }, { flag: '🇦🇺', name: 'Austria' }, { flag: '🇧🇪', name: 'Bhutan' }],
            bank: ['FIRST CITIZENS BANK LIMITED', 'BGFIBANK COTE D\'IVOIRE', 'DISCOVERY BANK LIMITED', 'FIRST CHOICE FINANCIAL FEDERAL CREDIT UNION', 'JSCB ROSBANK'],
            brand: ['Elo', 'Maestro', 'Mastercard', 'Visa'],
            type: ['Prepaid', 'Debit', 'Credit', 'Deferred_Debit'],
            level: ['PLATFORM', 'PREPAID CORPORATE', 'PREPAID ELECTRON', 'PREPAID PAYROLL', 'WORLD ELITE']
        };

        function renderFilters() {
            const countryContainer = document.getElementById('countryFilter');
            let countryHTML = '';
            filterOptions.country.forEach((c, i) => { if (i < 5) { countryHTML += `<span class="item"><span class="flag">${c.flag}</span> ${c.name}</span>`; } });
            countryHTML += `<button class="more" onclick="showMore('country')">${filterOptions.country.length - 5} more...</button>`;
            countryContainer.innerHTML = countryHTML;

            const bankContainer = document.getElementById('bankFilter');
            let bankHTML = '';
            filterOptions.bank.forEach((b, i) => { if (i < 5) { bankHTML += `<span class="item">${i === 3 ? '<span class="bank-bold">' : ''}${b}${i === 3 ? '</span>' : ''}</span>`; } });
            bankHTML += `<button class="more" onclick="showMore('bank')">${filterOptions.bank.length - 5} more...</button>`;
            bankContainer.innerHTML = bankHTML;

            document.getElementById('brandFilter').innerHTML = filterOptions.brand.map(b => `<span class="item">${b}</span>`).join('');
            document.getElementById('typeFilter').innerHTML = filterOptions.type.map(t => `<span class="item">${t}</span>`).join('');

            const levelContainer = document.getElementById('levelFilter');
            let levelHTML = '';
            filterOptions.level.forEach((l, i) => { if (i < 5) { levelHTML += `<span class="item">${l}</span>`; } });
            levelHTML += `<button class="more" onclick="showMore('level')">${filterOptions.level.length - 5} more...</button>`;
            levelContainer.innerHTML = levelHTML;
        }

        function loadSampleData() {
            const sample = [
                ['5275150064733918', '09', '27', '728', 'Visa', 'Credit', 'PLATFORM', 'FIRST CITIZENS BANK', '🇵🇷 Puerto Rico'],
                ['5207378365309277', '08', '2029', '559', 'Mastercard', 'Debit', 'PREPAID CORPORATE', 'DISCOVERY BANK', '🇬🇧 Guinea'],
                ['5205245052444513', '01', '29', '777', 'Visa', 'Prepaid', 'PREPAID ELECTRON', 'BGFIBANK', '🇳🇿 New Zealand'],
                ['4403931234567890', '12', '26', '123', 'Elo', 'Credit', 'WORLD ELITE', 'JSCB ROSBANK', '🇦🇺 Austria'],
                ['5104049876543210', '05', '28', '456', 'Maestro', 'Debit', 'PLATFORM', 'FIRST CHOICE FINANCIAL', '🇧🇪 Bhutan']
            ];
            allCards = sample.map(row => ({ card: row[0], month: row[1].padStart(2, '0'), year: row[2].length === 2 ? '20' + row[2] : row[2], cvv: row[3].padStart(3, '0'), brand: row[4], type: row[5], level: row[6], bank: row[7], country: row[8], bin: row[0].substring(0, 6) }));
            applyFilters();
            updateStats();
            renderTable();
            updateTotalCount();
        }

        let activeFilters = { country: [], bank: [], brand: [], type: [], level: [] };

        function showMore(type) {
            const options = [...new Set(allCards.map(c => { if (type === 'country') return c.country; if (type === 'bank') return c.bank; if (type === 'level') return c.level; return ''; }))].sort();
            const list = options.map(opt => `<div style="padding:6px 10px;cursor:pointer;border-bottom:1px solid #1a2333;" onclick="toggleFilter('${type}','${opt}')"><input type="checkbox" ${activeFilters[type].includes(opt) ? 'checked' : ''} /> ${opt}</div>`).join('');
            const modal = document.createElement('div');
            modal.style.cssText = `position:fixed; inset:0; background:rgba(0,0,0,0.8); display:flex; align-items:center; justify-content:center; z-index:9999;`;
            modal.innerHTML = `<div style="background:#141a26;border-radius:20px;padding:30px;max-width:400px;width:90%;max-height:70vh;overflow-y:auto;border:1px solid #2a3344;"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;"><h3 style="color:#fff;font-size:18px;">Select ${type}</h3><button onclick="this.closest('div[style]').remove()" style="background:none;border:none;color:#8a94a6;font-size:22px;cursor:pointer;">✕</button></div>${list}<div style="margin-top:16px;display:flex;gap:10px;"><button onclick="document.querySelectorAll('#filterModal input[type=checkbox]').forEach(cb=>cb.checked=true)" style="flex:1;padding:8px;border:none;border-radius:8px;background:#2a3344;color:#fff;cursor:pointer;">Select All</button><button onclick="document.querySelectorAll('#filterModal input[type=checkbox]').forEach(cb=>cb.checked=false)" style="flex:1;padding:8px;border:none;border-radius:8px;background:#1a2333;color:#8a94a6;cursor:pointer;">Clear</button><button onclick="applyFilterModal('${type}')" style="flex:1;padding:8px;border:none;border-radius:8px;background:#4d8cf7;color:#fff;cursor:pointer;">Apply</button></div></div>`;
            document.body.appendChild(modal);
        }

        function toggleFilter(type, value) {
            const idx = activeFilters[type].indexOf(value);
            if (idx > -1) activeFilters[type].splice(idx, 1);
            else activeFilters[type].push(value);
        }

        function applyFilterModal(type) { document.querySelector('div[style*="position:fixed"]')?.remove(); applyFilters(); }

        function applyFilters() {
            const hasFilters = Object.values(activeFilters).some(arr => arr.length > 0);
            if (!hasFilters) { filteredCards = [...allCards]; } else {
                filteredCards = allCards.filter(card => {
                    let match = true;
                    if (activeFilters.country.length > 0) match = match && activeFilters.country.includes(card.country);
                    if (activeFilters.bank.length > 0) match = match && activeFilters.bank.includes(card.bank);
                    if (activeFilters.brand.length > 0) match = match && activeFilters.brand.includes(card.brand);
                    if (activeFilters.type.length > 0) match = match && activeFilters.type.includes(card.type);
                    if (activeFilters.level.length > 0) match = match && activeFilters.level.includes(card.level);
                    return match;
                });
            }
            selectedIndices.clear();
            updateStats();
            renderTable();
            updateTotalCount();
            showToast(`✅ Applied filters: ${filteredCards.length} cards`);
        }

        function resetFilters() { activeFilters = { country: [], bank: [], brand: [], type: [], level: [] }; applyFilters(); showToast('⟳ Filters reset'); }

        function updateStats() {
            const total = filteredCards.length;
            const valid = filteredCards.filter(c => getCardStatus(c) === 'valid').length;
            const invalid = filteredCards.filter(c => getCardStatus(c) === 'invalid').length;
            const expired = filteredCards.filter(c => getCardStatus(c) === 'expired').length;
            document.getElementById('statTotal').textContent = total;
            document.getElementById('statValid').textContent = valid;
            document.getElementById('statInvalid').textContent = invalid;
            document.getElementById('statExpired').textContent = expired;
        }

        function updateTotalCount() { document.getElementById('totalDisplay').textContent = `${filteredCards.length.toLocaleString()} cards`; }

        function getCardStatus(card) {
            const now = new Date();
            const cardDate = new Date(parseInt(card.year), parseInt(card.month) - 1);
            if (cardDate < now) return 'expired';
            if (card.card.length >= 15 && luhnCheck(card.card)) return 'valid';
            return 'invalid';
        }

        function luhnCheck(card) {
            let sum = 0, alternate = false;
            for (let i = card.length - 1; i >= 0; i--) {
                let n = parseInt(card[i]);
                if (alternate) { n *= 2; if (n > 9) n = (n % 10) + 1; }
                sum += n;
                alternate = !alternate;
            }
            return sum % 10 === 0;
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            if (filteredCards.length === 0) { tbody.innerHTML = `<tr><td colspan="12" style="text-align:center;padding:40px;color:#5a6478;">📭 No cards match filters</td></tr>`; return; }
            tbody.innerHTML = filteredCards.map((card, idx) => {
                const status = getCardStatus(card);
                const statusIcon = status === 'valid' ? '✅' : status === 'expired' ? '⏳' : '❌';
                return `<tr><td class="checkbox-col"><input type="checkbox" class="row-cb" data-idx="${idx}" ${selectedIndices.has(idx) ? 'checked' : ''} onchange="toggleRow(${idx})" /></td><td><span class="bin-tag">${card.bin}</span> ${card.card}</td><td>${card.month}</td><td>${card.year.slice(-2)}</td><td>${card.cvv}</td><td>${card.bin}</td><td>${card.brand}</td><td>${card.type}</td><td>${card.level}</td><td style="font-size:11px;">${card.bank}</td><td style="font-size:12px;">${card.country}</td><td><span class="status-dot ${status}"></span> ${statusIcon}</td></tr>`;
            }).join('');
        }

        function toggleRow(idx) { if (selectedIndices.has(idx)) selectedIndices.delete(idx); else selectedIndices.add(idx); }

        function toggleAll() {
            const checked = document.getElementById('selectAll').checked;
            document.querySelectorAll('.row-cb').forEach(cb => { cb.checked = checked; const idx = parseInt(cb.dataset.idx); if (checked) selectedIndices.add(idx); else selectedIndices.delete(idx); });
        }

        function sortBy(field) { filteredCards.sort((a, b) => { if (a[field] < b[field]) return -1; if (a[field] > b[field]) return 1; return 0; }); renderTable(); }

        function exportFiltered() {
            if (filteredCards.length === 0) { showToast('⚠️ No cards to export'); return; }
            const text = filteredCards.map(c => `${c.card}|${c.month}|${c.year.slice(-2)}|${c.cvv}`).join('\n');
            downloadFile(text, 'filtered_cards.txt');
            showToast(`⬇ Exported ${filteredCards.length} cards`);
        }

        function downloadFile(content, filename) {
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
        }

        function showToast(msg) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        window.addEventListener('message', (event) => {
            if (event.data && event.data.type === 'CARDS_DATA') {
                allCards = event.data.cards.map(c => ({ ...c, bin: c.card.substring(0, 6) }));
                applyFilters();
                updateStats();
                renderTable();
                updateTotalCount();
            }
        });

        renderFilters();
        loadSampleData();
        if (window.Telegram && Telegram.WebApp) { Telegram.WebApp.ready(); }
    </script>
</body>
</html>
