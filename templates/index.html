<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔍 Friendly Sorter</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            padding: 20px;
            direction: rtl;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f2f5;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a2e;
        }
        .header h1 span {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .card-count {
            font-size: 14px;
            color: #666;
            background: #f0f2f5;
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: 500;
        }
        .upload-area {
            border: 2px dashed #d1d5db;
            padding: 25px;
            text-align: center;
            border-radius: 16px;
            margin-bottom: 25px;
            transition: all 0.3s;
            background: #fafbfc;
            cursor: pointer;
        }
        .upload-area:hover {
            border-color: #667eea;
            background: #f5f3ff;
        }
        .upload-area.dragover {
            border-color: #667eea;
            background: #ede9fe;
        }
        .upload-area .icon { font-size: 40px; display: block; margin-bottom: 8px; }
        .upload-area p { color: #6b7280; font-size: 14px; }
        .upload-area label { color: #667eea; font-weight: 600; cursor: pointer; }
        .upload-area input[type="file"] { display: none; }
        .file-info {
            display: none;
            background: #dbeafe;
            color: #1e40af;
            padding: 10px 16px;
            border-radius: 10px;
            margin: 10px 0;
            font-size: 14px;
        }
        .filters-title {
            font-size: 16px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 16px;
        }
        .filters-title small {
            font-weight: 400;
            color: #9ca3af;
            font-size: 13px;
        }
        .filters-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }
        @media (max-width: 640px) { .filters-grid { grid-template-columns: 1fr; } }
        .filter-group {
            background: #f8fafc;
            border-radius: 12px;
            padding: 14px 16px;
            border: 1px solid #e5e7eb;
            transition: border-color 0.2s;
        }
        .filter-group:hover { border-color: #c4b5fd; }
        .filter-group label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
            color: #1a1a2e;
            font-size: 14px;
            margin-bottom: 8px;
        }
        .filter-group label .count {
            font-weight: 400;
            color: #9ca3af;
            font-size: 12px;
            background: #e5e7eb;
            padding: 0 10px;
            border-radius: 12px;
        }
        .search-input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.2s;
            background: white;
            color: #1a1a2e;
        }
        .search-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        .search-input::placeholder { color: #9ca3af; }
        .options-list {
            max-height: 130px;
            overflow-y: auto;
            margin-top: 6px;
            padding: 4px 0;
        }
        .options-list::-webkit-scrollbar { width: 4px; }
        .options-list::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        .options-list::-webkit-scrollbar-thumb { background: #c4b5fd; border-radius: 10px; }
        .option-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 8px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 13px;
            color: #374151;
        }
        .option-item:hover { background: #ede9fe; }
        .option-item input[type="checkbox"],
        .option-item input[type="radio"] {
            accent-color: #667eea;
            width: 16px;
            height: 16px;
            cursor: pointer;
            flex-shrink: 0;
        }
        .option-item .flag { font-size: 16px; }
        .option-item .more { color: #9ca3af; font-size: 12px; }
        .option-item.selected { background: #ede9fe; }
        .tab-options {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 6px;
        }
        .tab-options .option-item {
            padding: 4px 14px;
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 20px;
            font-size: 13px;
            color: #374151;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab-options .option-item:hover {
            border-color: #667eea;
            background: #f5f3ff;
        }
        .tab-options .option-item.active {
            border-color: #667eea;
            background: #ede9fe;
            color: #5b21b6;
            font-weight: 500;
        }
        .tab-options .option-item input { display: none; }
        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 20px 0;
        }
        .btn {
            padding: 10px 28px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102,126,234,0.4);
        }
        .btn-secondary { background: #f3f4f6; color: #374151; }
        .btn-secondary:hover { background: #e5e7eb; }
        .btn-success { background: #10b981; color: white; }
        .btn-success:hover {
            background: #059669;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(16,185,129,0.4);
        }
        .btn-danger { background: #ef4444; color: white; }
        .btn-danger:hover { background: #dc2626; }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }
        .stats-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin: 16px 0;
        }
        .stat-box {
            background: #f8fafc;
            padding: 10px 20px;
            border-radius: 12px;
            border: 1px solid #e5e7eb;
            flex: 1;
            min-width: 80px;
            text-align: center;
        }
        .stat-box .number { font-size: 22px; font-weight: 700; color: #1a1a2e; }
        .stat-box .label { font-size: 12px; color: #9ca3af; }
        .stat-box.highlight .number { color: #667eea; }
        .stat-box.success .number { color: #10b981; }
        .cards-display {
            background: #1a1a2e;
            color: #00ff41;
            padding: 16px 20px;
            border-radius: 12px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 350px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
            margin-top: 16px;
        }
        .cards-display::-webkit-scrollbar { width: 6px; }
        .cards-display::-webkit-scrollbar-track { background: #1a1a2e; }
        .cards-display::-webkit-scrollbar-thumb { background: #667eea; border-radius: 4px; }
        .cards-display .empty { color: #6b7280; text-align: center; padding: 30px 0; }
        .send-section {
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            padding: 20px 24px;
            border-radius: 16px;
            margin-top: 20px;
            border: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .send-section .info { display: flex; align-items: center; gap: 12px; }
        .send-section .info .icon { font-size: 28px; }
        .send-section .info .text { font-size: 14px; color: #374151; }
        .send-section .info .text strong { color: #1a1a2e; }
        .btn-send { padding: 12px 40px; border-radius: 50px; font-size: 18px; }
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 14px 28px;
            border-radius: 12px;
            color: white;
            font-weight: 500;
            display: none;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            max-width: 400px;
        }
        .toast.success { background: #10b981; }
        .toast.error { background: #ef4444; }
        .toast.info { background: #3b82f6; }
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        .loading .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e5e7eb;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @media (max-width: 600px) {
            .container { padding: 16px; border-radius: 16px; }
            .header h1 { font-size: 20px; }
            .card-count { font-size: 12px; padding: 4px 12px; }
            .send-section { flex-direction: column; text-align: center; }
            .btn { width: 100%; justify-content: center; }
            .stats-row { gap: 8px; }
            .stat-box { min-width: 60px; padding: 8px 12px; }
            .stat-box .number { font-size: 18px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 <span>Friendly Sorter</span></h1>
            <div class="card-count" id="cardCount">0 cards</div>
        </div>
        
        <div class="upload-area" id="uploadArea">
            <span class="icon">📁</span>
            <p>اسحب الملف هنا أو <label for="fileInput">اختر ملف</label></p>
            <input type="file" id="fileInput" accept=".txt,.csv">
        </div>
        
        <div class="file-info" id="fileInfo">
            ✅ تم تحميل: <span id="fileName">file.txt</span> - <span id="fileCount">0</span> بطاقة
        </div>
        
        <div class="filters-title">
            🎯 Select filters <small>اختر الفلاتر المناسبة</small>
        </div>
        
        <div class="filters-grid">
            <div class="filter-group">
                <label>🌍 Country <span class="count" id="countryCount">0</span></label>
                <input type="text" class="search-input" id="countrySearch" placeholder="بحث عن دولة...">
                <div class="options-list" id="countryList"></div>
            </div>
            
            <div class="filter-group">
                <label>🏦 Bank <span class="count" id="bankCount">0</span></label>
                <input type="text" class="search-input" id="bankSearch" placeholder="بحث عن بنك...">
                <div class="options-list" id="bankList"></div>
            </div>
            
            <div class="filter-group">
                <label>💳 Brand</label>
                <div class="tab-options" id="brandList"></div>
            </div>
            
            <div class="filter-group">
                <label>📋 Type</label>
                <div class="tab-options" id="typeList"></div>
            </div>
            
            <div class="filter-group" style="grid-column: span 2;">
                <label>⭐ Level <span class="count" id="levelCount">0</span></label>
                <div class="tab-options" id="levelList"></div>
            </div>
        </div>
        
        <div class="btn-group">
            <button class="btn btn-primary" onclick="applyFilters()">🔍 Apply Filters</button>
            <button class="btn btn-secondary" onclick="resetFilters()">🔄 Reset</button>
            <button class="btn btn-success" onclick="exportCards()">📥 Export</button>
            <button class="btn btn-danger" onclick="clearAll()">🗑️ Clear All</button>
        </div>
        
        <div class="stats-row">
            <div class="stat-box highlight">
                <div class="number" id="totalCards">0</div>
                <div class="label">📊 Total Cards</div>
            </div>
            <div class="stat-box success">
                <div class="number" id="filteredCards">0</div>
                <div class="label">✅ Filtered</div>
            </div>
            <div class="stat-box">
                <div class="number" id="validCards">0</div>
                <div class="label">⏰ Valid</div>
            </div>
        </div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="color: #6b7280;">⏳ جاري التصفية...</p>
        </div>
        
        <div class="cards-display" id="cardsDisplay">
            <div class="empty">📋 انتظر حتى يتم تحميل البطاقات...</div>
        </div>
        
        <div class="send-section">
            <div class="info">
                <span class="icon">📤</span>
                <div class="text">
                    <strong>إرسال للبوت</strong>
                    <div style="font-size:12px;color:#9ca3af;">سيتم إرسال البطاقات المصفاة</div>
                </div>
            </div>
            <button class="btn btn-primary btn-send" id="sendBtn" onclick="sendToBot()" disabled>
                📤 Send to Bot
            </button>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>

    <script>
        // ========================================
        // ============ بيانات ============
        // ========================================
        let allCards = [];
        let filteredCards = [];
        let originalCards = [];
        let userId = '';
        let countriesData = {};
        let banksData = {};
        let brandsData = new Set();
        let typesData = new Set();
        let levelsData = new Set();
        let selectedFilters = { country: '', bank: '', brand: '', type: '', level: '' };

        // ========================================
        // ============ دوال مساعدة ============
        // ========================================
        function getUserId() {
            const params = new URLSearchParams(window.location.search);
            userId = params.get('user_id') || '';
            if (!userId && window.Telegram && window.Telegram.WebApp) {
                userId = window.Telegram.WebApp.initDataUnsafe?.user?.id || '';
            }
            return userId;
        }

        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type;
            toast.style.display = 'block';
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }

        function isValidExpiry(month, year) {
            try {
                month = month.trim(); year = year.trim();
                if (year.length === 2) year = '20' + year;
                const monthInt = parseInt(month), yearInt = parseInt(year);
                if (monthInt < 1 || monthInt > 12) return false;
                const now = new Date();
                const currentYear = now.getFullYear(), currentMonth = now.getMonth() + 1;
                if (yearInt < currentYear) return false;
                if (yearInt === currentYear && monthInt < currentMonth) return false;
                return true;
            } catch { return false; }
        }

        function getFlag(country) {
            const flags = {
                'United States': '🇺🇸', 'United Kingdom': '🇬🇧', 'Germany': '🇩🇪',
                'France': '🇫🇷', 'Italy': '🇮🇹', 'Spain': '🇪🇸', 'Canada': '🇨🇦',
                'Australia': '🇦🇺', 'Egypt': '🇪🇬', 'Saudi Arabia': '🇸🇦',
                'UAE': '🇦🇪', 'Russia': '🇷🇺', 'China': '🇨🇳', 'Japan': '🇯🇵',
                'India': '🇮🇳', 'Brazil': '🇧🇷', 'Mexico': '🇲🇽', 'South Africa': '🇿🇦',
                'Turkey': '🇹🇷', 'Pakistan': '🇵🇰', 'Nigeria': '🇳🇬', 'Morocco': '🇲🇦',
                'Algeria': '🇩🇿', 'Tunisia': '🇹🇳', 'Jordan': '🇯🇴', 'Lebanon': '🇱🇧',
                'Kuwait': '🇰🇼', 'Qatar': '🇶🇦', 'Bahrain': '🇧🇭', 'Oman': '🇴🇲'
            };
            return flags[country] || '🌍';
        }

        // ========================================
        // ============ API Calls ============
        // ========================================
        async function extractAllInfo(cards) {
            try {
                const response = await fetch('/extract_info', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ cards: cards.join('\n') })
                });
                return await response.json();
            } catch (error) {
                console.error('Error extracting info:', error);
                return null;
            }
        }

        async function applyFiltersAPI(cards, filters) {
            try {
                const response = await fetch('/filter', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ cards: cards.join('\n'), filters: filters })
                });
                return await response.json();
            } catch (error) {
                console.error('Error filtering:', error);
                return null;
            }
        }

        // ========================================
        // ============ عرض الفلاتر ============
        // ========================================
        function renderFilters() {
            const countryList = document.getElementById('countryList');
            countryList.innerHTML = '';
            const countryEntries = Object.entries(countriesData);
            countryEntries.slice(0, 5).forEach(([country, count]) => {
                const div = document.createElement('div');
                div.className = 'option-item';
                div.innerHTML = `
                    <input type="radio" name="country" value="${country}" onchange="selectCountry('${country}')">
                    <span class="flag">${getFlag(country)}</span> ${country} <span class="more">(${count})</span>
                `;
                countryList.appendChild(div);
            });
            if (countryEntries.length > 5) {
                const div = document.createElement('div');
                div.className = 'option-item';
                div.style.color = '#9ca3af';
                div.style.fontSize = '12px';
                div.textContent = `+ ${countryEntries.length - 5} more...`;
                countryList.appendChild(div);
            }
            document.getElementById('countryCount').textContent = countryEntries.length;

            const bankList = document.getElementById('bankList');
            bankList.innerHTML = '';
            const bankEntries = Object.entries(banksData);
            bankEntries.slice(0, 5).forEach(([bank, count]) => {
                const div = document.createElement('div');
                div.className = 'option-item';
                div.innerHTML = `
                    <input type="radio" name="bank" value="${bank}" onchange="selectBank('${bank}')">
                    ${bank} <span class="more">(${count})</span>
                `;
                bankList.appendChild(div);
            });
            if (bankEntries.length > 5) {
                const div = document.createElement('div');
                div.className = 'option-item';
                div.style.color = '#9ca3af';
                div.style.fontSize = '12px';
                div.textContent = `+ ${bankEntries.length - 5} more...`;
                bankList.appendChild(div);
            }
            document.getElementById('bankCount').textContent = bankEntries.length;

            const brandList = document.getElementById('brandList');
            brandList.innerHTML = `<div class="option-item active" onclick="selectBrand('')">الكل</div>`;
            brandsData.forEach(brand => {
                const div = document.createElement('div');
                div.className = 'option-item';
                div.textContent = brand;
                div.onclick = function() { selectBrand(brand); };
                brandList.appendChild(div);
            });

            const typeList = document.getElementById('typeList');
            typeList.innerHTML = `<div class="option-item active" onclick="selectType('')">الكل</div>`;
            typesData.forEach(type => {
                const div = document.createElement('div');
                div.className = 'option-item';
                div.textContent = type;
                div.onclick = function() { selectType(type); };
                typeList.appendChild(div);
            });

            const levelList = document.getElementById('levelList');
            levelList.innerHTML = `<div class="option-item active" onclick="selectLevel('')">الكل</div>`;
            levelsData.forEach(level => {
                const div = document.createElement('div');
                div.className = 'option-item';
                div.textContent = level;
                div.onclick = function() { selectLevel(level); };
                levelList.appendChild(div);
            });
            document.getElementById('levelCount').textContent = levelsData.size;
        }

        // ========================================
        // ============ اختيار الفلاتر ============
        // ========================================
        function selectCountry(value) { selectedFilters.country = value; updateFilterUI(); }
        function selectBank(value) { selectedFilters.bank = value; updateFilterUI(); }
        function selectBrand(value) {
            selectedFilters.brand = value;
            document.querySelectorAll('#brandList .option-item').forEach(el => {
                el.classList.toggle('active', el.textContent === value || (value === '' && el.textContent === 'الكل'));
            });
        }
        function selectType(value) {
            selectedFilters.type = value;
            document.querySelectorAll('#typeList .option-item').forEach(el => {
                el.classList.toggle('active', el.textContent === value || (value === '' && el.textContent === 'الكل'));
            });
        }
        function selectLevel(value) {
            selectedFilters.level = value;
            document.querySelectorAll('#levelList .option-item').forEach(el => {
                el.classList.toggle('active', el.textContent === value || (value === '' && el.textContent === 'الكل'));
            });
        }
        function updateFilterUI() {
            document.querySelectorAll('#countryList input[type="radio"]').forEach(el => {
                el.checked = el.value === selectedFilters.country;
            });
            document.querySelectorAll('#bankList input[type="radio"]').forEach(el => {
                el.checked = el.value === selectedFilters.bank;
            });
        }

        // ========================================
        // ============ دوال الفلتر ============
        // ========================================
        async function applyFilters() {
            if (allCards.length === 0) {
                showToast('❌ لا توجد بطاقات للتصفية. ارفع ملف أولاً.', 'error');
                return;
            }
            document.getElementById('loading').style.display = 'block';
            document.getElementById('sendBtn').disabled = true;

            const filters = {
                country: selectedFilters.country || '',
                bank: selectedFilters.bank || '',
                brand: selectedFilters.brand || '',
                type: selectedFilters.type || '',
                level: selectedFilters.level || ''
            };

            const result = await applyFiltersAPI(allCards, filters);
            if (result && result.filtered) {
                filteredCards = result.filtered.split('\n').filter(c => c.trim());
                updateDisplay();
                showToast(`✅ تم التصفية! ${filteredCards.length} بطاقة`, 'success');
            } else {
                showToast('❌ خطأ في التصفية', 'error');
            }
            document.getElementById('loading').style.display = 'none';
            document.getElementById('sendBtn').disabled = false;
        }

        function resetFilters() {
            selectedFilters = { country: '', bank: '', brand: '', type: '', level: '' };
            document.querySelectorAll('.option-item.active').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('#brandList .option-item:first-child, #typeList .option-item:first-child, #levelList .option-item:first-child').forEach(el => el.classList.add('active'));
            document.querySelectorAll('#countryList input[type="radio"], #bankList input[type="radio"]').forEach(el => el.checked = false);
            filteredCards = [...allCards];
            updateDisplay();
            showToast('🔄 تم إعادة تعيين الفلاتر', 'info');
        }

        function clearAll() {
            allCards = []; filteredCards = []; originalCards = [];
            document.getElementById('fileInfo').style.display = 'none';
            updateDisplay();
            document.getElementById('sendBtn').disabled = true;
            showToast('🗑️ تم مسح جميع البطاقات', 'info');
        }

        function exportCards() {
            if (filteredCards.length === 0) {
                showToast('❌ لا توجد بطاقات للتصدير', 'error');
                return;
            }
            const content = filteredCards.join('\n');
            const blob = new Blob([content], {type: 'text/plain'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `filtered_cards_${Date.now()}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast('📥 تم التصدير!', 'success');
        }

        // ========================================
        // ============ عرض البطاقات ============
        // ========================================
        function updateDisplay() {
            document.getElementById('totalCards').textContent = allCards.length;
            document.getElementById('filteredCards').textContent = filteredCards.length;
            document.getElementById('cardCount').textContent = `${allCards.length} cards`;

            let valid = 0;
            filteredCards.forEach(card => {
                const parts = card.split('|');
                if (parts.length >= 3 && isValidExpiry(parts[1].trim(), parts[2].trim())) valid++;
            });
            document.getElementById('validCards').textContent = valid;

            const display = document.getElementById('cardsDisplay');
            if (filteredCards.length > 0) {
                display.innerHTML = filteredCards.join('\n');
            } else {
                display.innerHTML = '<div class="empty">📋 لا توجد بطاقات مطابقة للفلاتر</div>';
            }

            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = !(filteredCards.length > 0 && userId);
        }

        // ========================================
        // ============ إرسال للبوت ============
        // ========================================
        async function sendToBot() {
            if (filteredCards.length === 0) {
                showToast('❌ لا توجد بطاقات للإرسال', 'error');
                return;
            }
            if (!userId) {
                showToast('❌ يرجى فتح الويب اب من داخل البوت', 'error');
                return;
            }

            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;
            sendBtn.textContent = '⏳ جاري الإرسال...';

            try {
                const response = await fetch('/send_to_bot', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        cards: filteredCards.join('\n'),
                        user_id: userId,
                        filters: selectedFilters
                    })
                });
                const data = await response.json();
                if (data.status === 'success') {
                    showToast('✅ تم إرسال الملف للبوت!', 'success');
                    sendBtn.textContent = '✅ تم الإرسال';
                } else {
                    showToast('❌ فشل الإرسال: ' + (data.error || 'خطأ'), 'error');
                    sendBtn.textContent = '📤 Send to Bot';
                    sendBtn.disabled = false;
                }
            } catch (error) {
                showToast('❌ خطأ في الإرسال', 'error');
                sendBtn.textContent = '📤 Send to Bot';
                sendBtn.disabled = false;
            }
        }

        // ========================================
        // ============ رفع الملف ============
        // ========================================
        document.getElementById('fileInput').addEventListener('change', function(e) {
            if (e.target.files[0]) loadFile(e.target.files[0]);
        });

        const uploadArea = document.getElementById('uploadArea');
        uploadArea.addEventListener('dragover', function(e) {
            e.preventDefault();
            this.classList.add('dragover');
        });
        uploadArea.addEventListener('dragleave', function(e) {
            e.preventDefault();
            this.classList.remove('dragover');
        });
        uploadArea.addEventListener('drop', function(e) {
            e.preventDefault();
            this.classList.remove('dragover');
            if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
        });

        async function loadFile(file) {
            const reader = new FileReader();
            reader.onload = async function(event) {
                const content = event.target.result;
                originalCards = content.split('\n').filter(c => c.trim());
                allCards = [...originalCards];
                filteredCards = [...allCards];

                document.getElementById('loading').style.display = 'block';
                const result = await extractAllInfo(allCards);
                if (result) {
                    countriesData = result.countries || {};
                    banksData = result.banks || {};
                    brandsData = new Set(result.brands || []);
                    typesData = new Set(result.types || []);
                    levelsData = new Set(result.levels || []);
                    renderFilters();
                }
                document.getElementById('loading').style.display = 'none';

                updateDisplay();
                document.getElementById('fileInfo').style.display = 'block';
                document.getElementById('fileCount').textContent = allCards.length;
                document.getElementById('fileName').textContent = file.name;
                document.getElementById('sendBtn').disabled = false;
                showToast(`✅ تم تحميل ${allCards.length} بطاقة`, 'success');
            };
            reader.readAsText(file);
        }

        // ========================================
        // ============ بحث ============
        // ========================================
        document.getElementById('countrySearch').addEventListener('input', function() {
            const query = this.value.toLowerCase();
            document.querySelectorAll('#countryList .option-item').forEach(item => {
                item.style.display = item.textContent.toLowerCase().includes(query) || query === '' ? '' : 'none';
            });
        });

        document.getElementById('bankSearch').addEventListener('input', function() {
            const query = this.value.toLowerCase();
            document.querySelectorAll('#bankList .option-item').forEach(item => {
                item.style.display = item.textContent.toLowerCase().includes(query) || query === '' ? '' : 'none';
            });
        });

        // ========================================
        // ============ بدء التشغيل ============
        // ========================================
        getUserId();
        console.log('🔍 Friendly Sorter loaded!');
        console.log('👤 User ID:', userId);

        window.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'cards_data') {
                const cards = event.data.cards.split('\n').filter(c => c.trim());
                allCards = cards;
                filteredCards = [...allCards];
                extractAllInfo(allCards).then(result => {
                    if (result) {
                        countriesData = result.countries || {};
                        banksData = result.banks || {};
                        brandsData = new Set(result.brands || []);
                        typesData = new Set(result.types || []);
                        levelsData = new Set(result.levels || []);
                        renderFilters();
                    }
                    updateDisplay();
                    document.getElementById('fileInfo').style.display = 'block';
                    document.getElementById('fileCount').textContent = allCards.length;
                    document.getElementById('fileName').textContent = 'من البوت';
                    showToast(`✅ تم استلام ${allCards.length} بطاقة`, 'success');
                });
            }
        });
    </script>
</body>
</html>
